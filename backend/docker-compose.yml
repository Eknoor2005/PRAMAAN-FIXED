version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: pramaan-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DB: pramaan
    volumes:
      - mongodb_data:/data/db
    networks:
      - pramaan-network

  backend:
    build: .
    container_name: pramaan-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongodb:27017/pramaan?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_change_in_production}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      - mongodb
    networks:
      - pramaan-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  pramaan-network:
    driver: bridge
